name: CI

on:
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: ci-${{ github.event.pull_request.head.repo.full_name }}-${{ github.event.pull_request.head.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  issues: read
  pull-requests: read

jobs:
  detect-ci-changes:
    runs-on: ubuntu-latest
    outputs:
      docs_changed: ${{ steps.changes.outputs.docs_changed }}
      swift_changed: ${{ steps.changes.outputs.swift_changed }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 2

      - name: Detect CI-relevant changes
        id: changes
        shell: bash
        run: |
          git fetch --no-tags --depth=1 origin "${{ github.event.pull_request.base.sha }}"
          changed_files="$(git diff --name-only "${{ github.event.pull_request.base.sha }}" "${{ github.sha }}")"
          if grep -Eq '^(docs/|site/|README\.md|QUICKSTART\.md|SECURITY\.md|CONTRIBUTING\.md)' <<< "$changed_files"; then
            echo "docs_changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "docs_changed=false" >> "$GITHUB_OUTPUT"
          fi

          if grep -Eq '(\.swift$|\.plist$|\.entitlements$|\.xcodeproj/|\.xcworkspace/|\.xcconfig$|^Resources/|^Sources/|^Tests/|^\.github/workflows/ci\.yml$|^Package\.swift$|^Package\.resolved$)' <<< "$changed_files"; then
            echo "swift_changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "swift_changed=false" >> "$GITHUB_OUTPUT"
          fi

  runtime-guardrails:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 2

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Resolve base ref
        id: base
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            echo "ref=${{ github.event.pull_request.base.sha }}" >> "$GITHUB_OUTPUT"
          else
            echo "ref=${{ github.event.before }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Run runtime guardrails validator
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git fetch --no-tags --depth=1 origin "${{ steps.base.outputs.ref }}"
          ./scripts/validate.sh "${{ steps.base.outputs.ref }}"

  docs-site-validation:
    needs:
      - detect-ci-changes
      - runtime-guardrails
    if: needs.detect-ci-changes.outputs.docs_changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 2

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: site/package-lock.json

      - name: Install docs site dependencies
        run: npm ci --prefix site

      - name: Build docs site
        run: npm run build --prefix site

  macos-build-and-test:
    needs:
      - detect-ci-changes
      - runtime-guardrails
    if: needs.detect-ci-changes.outputs.swift_changed == 'true'
    # Self-hosted ABD-Enterprises org runner with Xcode 26.5; declared
    # in deffenda/brew-sync manifests/github-runners.yaml. Falls back to
    # macos-26 (GitHub-hosted, with the 10x minute multiplier) by manual
    # workflow re-run if the self-hosted runner is offline. See the
    # `Select Xcode` step for how this job tolerates both layouts.
    runs-on: [self-hosted, macOS, ARM64]
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 2

      - name: Select Xcode (project file requires Xcode 26)
        run: |
          # The .xcodeproj is in objectVersion 77, which only Xcode 26+
          # can read. Two valid layouts:
          #   1. GitHub-hosted macos-26 runners: /Applications/Xcode_26*.app
          #      (multiple side-by-side versions are present; pick newest)
          #   2. Self-hosted runners (the brew-sync fleet Mac): just
          #      /Applications/Xcode.app, which we accept if its
          #      CFBundleShortVersionString starts with `26`.
          XCODE_APP=$(find /Applications -maxdepth 1 -type d -name 'Xcode_26*.app' -print | sort -V | tail -1)

          if [[ -z "$XCODE_APP" && -d /Applications/Xcode.app ]]; then
            VERSION=$(defaults read /Applications/Xcode.app/Contents/Info CFBundleShortVersionString 2>/dev/null || echo "")
            if [[ "$VERSION" == 26* ]]; then
              XCODE_APP=/Applications/Xcode.app
              echo "Accepting /Applications/Xcode.app (version $VERSION) â€” likely self-hosted runner."
            fi
          fi

          if [[ -z "$XCODE_APP" ]]; then
            echo "::error::No Xcode 26.x found. Looked for /Applications/Xcode_26*.app and /Applications/Xcode.app. Installed Xcode apps:"
            ls -d /Applications/Xcode*.app || true
            exit 1
          fi

          echo "Selected $XCODE_APP"
          # Self-hosted runners may not allow passwordless sudo; only
          # invoke `sudo xcode-select` when running as a non-root user on
          # a hosted runner. DEVELOPER_DIR works on both.
          if [[ -n "$RUNNER_ENVIRONMENT" && "$RUNNER_ENVIRONMENT" == "github-hosted" ]]; then
            sudo xcode-select -s "$XCODE_APP"
          fi
          echo "DEVELOPER_DIR=$XCODE_APP/Contents/Developer" >> "$GITHUB_ENV"

      - name: Show toolchain
        run: |
          xcodebuild -version
          swift --version

      - name: Build (Debug, macOS)
        run: |
          set -o pipefail
          xcodebuild \
            -project BugNarrator.xcodeproj \
            -scheme BugNarrator \
            -configuration Debug \
            -destination 'platform=macOS' \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Run unit tests (BugNarratorTests only; UITests need a window server)
        run: |
          set -o pipefail
          xcodebuild \
            -project BugNarrator.xcodeproj \
            -scheme BugNarrator \
            -configuration Debug \
            -destination 'platform=macOS' \
            -only-testing:BugNarratorTests \
            CODE_SIGNING_ALLOWED=NO \
            test
