name: CI

on:
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: read

jobs:
  runtime-guardrails:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 2

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Resolve base ref
        id: base
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            echo "ref=${{ github.event.pull_request.base.sha }}" >> "$GITHUB_OUTPUT"
          else
            echo "ref=${{ github.event.before }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Run runtime guardrails validator
        run: |
          git fetch --no-tags --depth=1 origin "${{ steps.base.outputs.ref }}"
          ./scripts/validate.sh "${{ steps.base.outputs.ref }}"

  docs-site-validation:
    needs: runtime-guardrails
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 2

      - name: Detect docs site changes
        id: docs_changes
        shell: bash
        run: |
          git fetch --no-tags --depth=1 origin "${{ github.event.pull_request.base.sha }}"
          changed_files="$(git diff --name-only "${{ github.event.pull_request.base.sha }}" "${{ github.sha }}")"
          if grep -Eq '^(docs/|site/|README\.md|QUICKSTART\.md|SECURITY\.md|CONTRIBUTING\.md)' <<< "$changed_files"; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Node
        if: steps.docs_changes.outputs.changed == 'true'
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: site/package-lock.json

      - name: Install docs site dependencies
        if: steps.docs_changes.outputs.changed == 'true'
        run: npm ci --prefix site

      - name: Build docs site
        if: steps.docs_changes.outputs.changed == 'true'
        run: npm run build --prefix site

  macos-build-and-test:
    runs-on: macos-26
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 2

      - name: Detect Swift / project changes
        id: swift_changes
        shell: bash
        run: |
          git fetch --no-tags --depth=1 origin "${{ github.event.pull_request.base.sha }}"
          changed_files="$(git diff --name-only "${{ github.event.pull_request.base.sha }}" "${{ github.sha }}")"
          if grep -Eq '(\.swift$|\.plist$|\.entitlements$|\.xcodeproj/|\.xcworkspace/|\.xcconfig$|^Resources/|^Sources/|^Tests/|^\.github/workflows/ci\.yml$|^Package\.swift$|^Package\.resolved$)' <<< "$changed_files"; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Select Xcode (project file requires Xcode 26)
        if: steps.swift_changes.outputs.changed == 'true'
        run: |
          # The .xcodeproj is in objectVersion 77, which only Xcode 26+ can read.
          # macos-26 default Xcode is 26.4.1; prefer the newest 26.x available.
          XCODE_APP=$(ls -d /Applications/Xcode_26*.app 2>/dev/null | sort -V | tail -1)
          if [[ -z "$XCODE_APP" ]]; then
            echo "::error::No Xcode 26.x found. Installed Xcode apps:"
            ls -d /Applications/Xcode*.app || true
            exit 1
          fi
          echo "Selected $XCODE_APP"
          sudo xcode-select -s "$XCODE_APP"
          echo "DEVELOPER_DIR=$XCODE_APP/Contents/Developer" >> "$GITHUB_ENV"

      - name: Show toolchain
        if: steps.swift_changes.outputs.changed == 'true'
        run: |
          xcodebuild -version
          swift --version

      - name: Build (Debug, macOS)
        if: steps.swift_changes.outputs.changed == 'true'
        run: |
          set -o pipefail
          xcodebuild \
            -project BugNarrator.xcodeproj \
            -scheme BugNarrator \
            -configuration Debug \
            -destination 'platform=macOS' \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Run unit tests (BugNarratorTests only; UITests need a window server)
        if: steps.swift_changes.outputs.changed == 'true'
        run: |
          set -o pipefail
          xcodebuild \
            -project BugNarrator.xcodeproj \
            -scheme BugNarrator \
            -configuration Debug \
            -destination 'platform=macOS' \
            -only-testing:BugNarratorTests \
            CODE_SIGNING_ALLOWED=NO \
            test
