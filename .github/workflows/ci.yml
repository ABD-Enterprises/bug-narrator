name: CI

on:
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: ci-${{ github.event.pull_request.head.repo.full_name }}-${{ github.event.pull_request.head.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  issues: read
  pull-requests: read
  actions: read

jobs:
  detect-ci-changes:
    runs-on: ubuntu-latest
    outputs:
      docs_changed: ${{ steps.changes.outputs.docs_changed }}
      swift_changed: ${{ steps.changes.outputs.swift_changed }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 2

      - name: Detect CI-relevant changes
        id: changes
        shell: bash
        run: |
          git fetch --no-tags --depth=1 origin "${{ github.event.pull_request.base.sha }}"
          changed_files="$(git diff --name-only "${{ github.event.pull_request.base.sha }}" "${{ github.sha }}")"
          if grep -Eq '^(docs/|site/|README\.md|QUICKSTART\.md|SECURITY\.md|CONTRIBUTING\.md)' <<< "$changed_files"; then
            echo "docs_changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "docs_changed=false" >> "$GITHUB_OUTPUT"
          fi

          if grep -Eq '(\.swift$|\.plist$|\.entitlements$|\.xcodeproj/|\.xcworkspace/|\.xcconfig$|^Resources/|^Sources/|^Tests/|^\.github/workflows/ci\.yml$|^Package\.swift$|^Package\.resolved$|^project\.ya?ml$)' <<< "$changed_files"; then
            echo "swift_changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "swift_changed=false" >> "$GITHUB_OUTPUT"
          fi

  runtime-guardrails:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 2

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Resolve base ref
        id: base
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            echo "ref=${{ github.event.pull_request.base.sha }}" >> "$GITHUB_OUTPUT"
          else
            echo "ref=${{ github.event.before }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Run runtime guardrails validator
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git fetch --no-tags --depth=1 origin "${{ steps.base.outputs.ref }}"
          ./scripts/validate.sh "${{ steps.base.outputs.ref }}"

  # Probe (#868, first slice of the org-runner migration): dual-run the runtime
  # guardrails validator on the org's self-hosted `[self-hosted, Linux, ARM64]`
  # runner (`docker-linux-arm64-orc-studio-macbookprom5`) alongside the existing
  # `runtime-guardrails` job on `ubuntu-latest`. Marked `continue-on-error: true`
  # so a probe failure does NOT block PR merges while we observe. Uploads
  # `artifacts/validation/*.txt` so we can inspect what pass/skip states the
  # probe produced (semgrep docker vs. local fallback, gh-CLI availability for
  # effort-leak-audit, etc.). Delete this job in the follow-up flip PR once the
  # probe is proven green on 2+ consecutive PRs.
  runtime-guardrails-linux-probe:
    # Runs unconditionally to match the source `runtime-guardrails` job's
    # coverage — otherwise a scripts-only or root-config PR would exercise
    # `runtime-guardrails` but skip the probe, leaving the flip-PR without
    # parity evidence for that PR shape.
    runs-on: [self-hosted, Linux, ARM64]
    continue-on-error: true
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 2

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Resolve base ref
        id: base
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            echo "ref=${{ github.event.pull_request.base.sha }}" >> "$GITHUB_OUTPUT"
          else
            echo "ref=${{ github.event.before }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Run runtime guardrails validator (probe)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git fetch --no-tags --depth=1 origin "${{ steps.base.outputs.ref }}"
          ./scripts/validate.sh "${{ steps.base.outputs.ref }}"

      - name: Upload validation status artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: runtime-guardrails-linux-probe-artifacts
          path: artifacts/validation/
          if-no-files-found: warn
          retention-days: 7

  docs-site-validation:
    needs:
      - detect-ci-changes
      - runtime-guardrails
    if: needs.detect-ci-changes.outputs.docs_changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 2

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: site/package-lock.json

      - name: Install docs site dependencies
        run: npm ci --prefix site

      - name: Build docs site
        run: npm run build --prefix site

  # Makes an offline self-hosted macOS runner VISIBLE instead of letting the
  # required macos-build-and-test job sit queued indefinitely (which reads as a
  # perpetual "pending" check and silently stalls merges). Runs on a hosted
  # runner and polls this run's own jobs API; if the macOS job has not started
  # within the grace period, it fails loudly so a human re-runs on GitHub-hosted
  # macos-26 or brings the runner back online.
  macos-runner-watchdog:
    # Mirror macos-build-and-test's prerequisites exactly so the grace clock
    # starts only once the macOS job is actually runner-eligible. If the watchdog
    # gated on fewer needs, a slow runtime-guardrails could trip the 10-minute
    # timeout while the macOS job is still legitimately blocked, failing a healthy
    # runner and stalling merges.
    needs:
      - detect-ci-changes
      - runtime-guardrails
    if: needs.detect-ci-changes.outputs.swift_changed == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Fail if the self-hosted macOS job never starts
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          grace_seconds=600   # 10 minutes for the self-hosted runner to pick up
          deadline=$(( SECONDS + grace_seconds ))
          while (( SECONDS < deadline )); do
            status="$(gh api "repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/jobs" \
              --jq '.jobs[] | select(.name=="macos-build-and-test") | .status' 2>/dev/null || echo "")"
            case "$status" in
              in_progress|completed)
                echo "macos-build-and-test status: $status — runner is online."
                exit 0
                ;;
              *)
                echo "macos-build-and-test status: '${status:-unknown}' — waiting for a runner..."
                sleep 30
                ;;
            esac
          done
          echo "::error::macos-build-and-test did not start within $(( grace_seconds / 60 )) minutes. The self-hosted macOS runner is likely offline. Re-run this workflow on GitHub-hosted macos-26 or bring the runner online."
          exit 1

  macos-build-and-test:
    needs:
      - detect-ci-changes
      - runtime-guardrails
    if: needs.detect-ci-changes.outputs.swift_changed == 'true'
    # Self-hosted ABD-Enterprises org runner with Xcode 26.5; declared
    # in deffenda/brew-sync manifests/github-runners.yaml. Falls back to
    # macos-26 (GitHub-hosted, with the 10x minute multiplier) by manual
    # workflow re-run if the self-hosted runner is offline. See the
    # `Select Xcode` step for how this job tolerates both layouts. The
    # macos-runner-watchdog job surfaces an offline runner as a hard failure.
    runs-on: [self-hosted, macOS, ARM64]
    # Fail fast on a hung/contended build instead of running for hours.
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 2

      - name: Select Xcode (project file requires Xcode 26)
        run: |
          # The .xcodeproj is in objectVersion 77, which only Xcode 26+
          # can read. Valid layouts:
          #   1. GitHub-hosted macos-26 runners: /Applications/Xcode_26*.app
          #      (multiple side-by-side versions are present; pick newest)
          #   2. Self-hosted runners (the brew-sync fleet Mac): just
          #      /Applications/Xcode.app, which we accept if its
          #      CFBundleShortVersionString starts with `26`.
          #   3. Self-hosted runners with xcode-select already pointing at
          #      an Xcode 26 developer directory outside the app paths above.
          XCODE_APP=$(find /Applications -maxdepth 1 -type d -name 'Xcode_26*.app' -print | sort -V | tail -1)

          if [[ -z "$XCODE_APP" && -d /Applications/Xcode.app ]]; then
            VERSION=$(defaults read /Applications/Xcode.app/Contents/Info CFBundleShortVersionString 2>/dev/null || echo "")
            if [[ "$VERSION" == 26* ]]; then
              XCODE_APP=/Applications/Xcode.app
              echo "Accepting /Applications/Xcode.app (version $VERSION) — likely self-hosted runner."
            fi
          fi

          if [[ -z "$XCODE_APP" ]]; then
            SELECTED_DEVELOPER_DIR=$(xcode-select -p 2>/dev/null || echo "")
            SELECTED_XCODE_APP="${SELECTED_DEVELOPER_DIR%/Contents/Developer}"
            if [[ -n "$SELECTED_DEVELOPER_DIR" && -d "$SELECTED_XCODE_APP/Contents" ]]; then
              VERSION=$(defaults read "$SELECTED_XCODE_APP/Contents/Info" CFBundleShortVersionString 2>/dev/null || echo "")
              if [[ "$VERSION" == 26* ]]; then
                XCODE_APP="$SELECTED_XCODE_APP"
                echo "Accepting selected Xcode at $XCODE_APP (version $VERSION)."
              fi
            fi
          fi

          if [[ -z "$XCODE_APP" ]]; then
            echo "::error::No Xcode 26.x found. Looked for /Applications/Xcode_26*.app, /Applications/Xcode.app, and the selected developer directory."
            echo "Selected developer directory: $(xcode-select -p 2>/dev/null || echo unavailable)"
            xcodebuild -version || true
            echo "Installed Xcode apps:"
            ls -d /Applications/Xcode*.app || true
            exit 1
          fi

          echo "Selected $XCODE_APP"
          # Self-hosted runners may not allow passwordless sudo; only
          # invoke `sudo xcode-select` when running as a non-root user on
          # a hosted runner. DEVELOPER_DIR works on both.
          if [[ -n "$RUNNER_ENVIRONMENT" && "$RUNNER_ENVIRONMENT" == "github-hosted" ]]; then
            sudo xcode-select -s "$XCODE_APP"
          fi
          echo "DEVELOPER_DIR=$XCODE_APP/Contents/Developer" >> "$GITHUB_ENV"

      - name: Show toolchain
        run: |
          xcodebuild -version
          swift --version

      - name: Build (Debug, macOS)
        run: |
          set -o pipefail
          xcodebuild \
            -project BugNarrator.xcodeproj \
            -scheme BugNarrator \
            -configuration Debug \
            -destination 'platform=macOS' \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Run unit tests (BugNarratorTests only; UITests need a window server)
        run: |
          set -o pipefail
          xcodebuild \
            -project BugNarrator.xcodeproj \
            -scheme BugNarrator \
            -configuration Debug \
            -destination 'platform=macOS' \
            -only-testing:BugNarratorTests \
            CODE_SIGNING_ALLOWED=NO \
            test
